<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control & Order</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
            color: #ffffff;
        }

        .score-board {
            font-size: 0.9rem;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .canvas-container {
            position: relative;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
        }

        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(13, 17, 23, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .game-over-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over-text {
            color: #ff4757;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(255, 71, 87, 0.3);
        }

        .restart-btn {
            background: #2f3640;
            color: #ffffff;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .restart-btn:hover {
            background: #353b48;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .controls:hover {
            opacity: 0.8;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: white;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .back-link {
            margin-top: 30px;
            color: #8b949e;
            text-decoration: none;
            font-size: 0.85rem;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }

        .back-link:hover {
            color: #ffffff;
            border-bottom: 1px solid #ffffff;
        }

        @media (max-width: 768px) {
            .controls {
                opacity: 0.8;
                gap: 20px;
            }
            .control-btn {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <h1>Control & Order</h1>
        <div class="score-board" id="score">제어된 데이터 (Data Controlled): 0</div>
        
        <div class="canvas-container">
            <canvas id="tetris" width="240" height="480"></canvas>
            <div class="game-over-screen" id="game-over">
                <div class="game-over-text">통제 상실 (System Overload)</div>
                <button class="restart-btn" onclick="gameReset()">시스템 재가동</button>
            </div>
        </div>

        <div class="controls">
            <div class="control-btn" id="btn-left">⬅️</div>
            <div class="control-btn" id="btn-down">⬇️</div>
            <div class="control-btn" id="btn-right">➡️</div>
            <div class="control-btn" id="btn-rotate">🔄</div>
        </div>

        <a href="index.html" class="back-link">메인 시스템으로 복귀</a>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');

        context.scale(24, 24);

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
        }

        function collide(arena, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'rgba(0,0,0,0.3)';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#0d1117';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function hardDrop() {
            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
            dropCounter = 0;
        }

        function playerMove(offset) {
            player.pos.x += offset;
            if (collide(arena, player)) {
                player.pos.x -= offset;
            }
        }

        function playerReset() {
            const pieces = 'TJLOSZI';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                isGameOver = true;
                gameOverScreen.classList.add('active');
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function gameReset() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            updateScore();
            isGameOver = false;
            gameOverScreen.classList.remove('active');
            playerReset();
            update();
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isGameOver = false;

        function update(time = 0) {
            if (isGameOver) return;
            
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            scoreElement.innerText = '제어된 데이터 (Data Controlled): ' + player.score;
        }

        const colors = [
            null,
            '#48cae4',
            '#0077b6',
            '#f77f00',
            '#fcbf49',
            '#2a9d8f',
            '#9d4edd',
            '#e63946'
        ];

        const arena = createMatrix(10, 20);

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
        };

        // 키보드 조작
        document.addEventListener('keydown', event => {
            if (isGameOver) return;
            
            if (event.keyCode === 37) {
                playerMove(-1);
                event.preventDefault();
            } else if (event.keyCode === 39) {
                playerMove(1);
                event.preventDefault();
            } else if (event.keyCode === 40) {
                playerDrop();
                event.preventDefault();
            } else if (event.keyCode === 38) {
                playerRotate(1);
                event.preventDefault();
            } else if (event.keyCode === 32) { // Space
                hardDrop();
                event.preventDefault();
            }
        });

        // 모바일 조작
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); if(!isGameOver) playerMove(-1); });
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); if(!isGameOver) playerMove(1); });
        document.getElementById('btn-down').addEventListener('touchstart', (e) => { e.preventDefault(); if(!isGameOver) playerDrop(); });
        document.getElementById('btn-rotate').addEventListener('touchstart', (e) => { e.preventDefault(); if(!isGameOver) playerRotate(1); });

        // 마우스 클릭 지원 (데스크톱 테스트용)
        document.getElementById('btn-left').addEventListener('click', () => { if(!isGameOver) playerMove(-1); });
        document.getElementById('btn-right').addEventListener('click', () => { if(!isGameOver) playerMove(1); });
        document.getElementById('btn-down').addEventListener('click', () => { if(!isGameOver) playerDrop(); });
        document.getElementById('btn-rotate').addEventListener('click', () => { if(!isGameOver) playerRotate(1); });

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
